name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]

env:
  ACR_NAME: aiquizgameacr
  ACR_LOGIN_SERVER: aiquizgameacr.azurecr.io
  CONTAINER_APP_NAME: ca-ai-quiz-game-server
  CONTAINER_APP_ENV: cae-ai-quiz-game
  RESOURCE_GROUP: rg-ai-quiz-game

jobs:
  deploy:
    name: Build & Deploy Server
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # required for OIDC login
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC — no client secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ env.ACR_LOGIN_SERVER }}/server:${{ github.sha }}
          docker build -t $IMAGE_TAG ./server
          docker push $IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp create \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --environment ${{ env.CONTAINER_APP_ENV }} \
            --image ${{ env.IMAGE_TAG }} \
            --registry-server ${{ env.ACR_LOGIN_SERVER }} \
            --target-port 3001 \
            --ingress external \
            --min-replicas 1 \
            --max-replicas 3 \
            --secrets \
              anthropic-key=${{ secrets.ANTHROPIC_API_KEY }} \
            --env-vars \
              ANTHROPIC_API_KEY=secretref:anthropic-key \
              NODE_ENV=production \
              CORS_ORIGIN=${{ secrets.CORS_ORIGIN }} \
              PORT=3001 \
          2>/dev/null || az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.IMAGE_TAG }}

      - name: Get deployed URL
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "✅ Server deployed: https://$FQDN"
          echo "SERVER_URL=https://$FQDN" >> $GITHUB_ENV

      - name: Build client
        working-directory: client
        run: |
          npm ci
          VITE_API_URL=${{ env.SERVER_URL }} npm run build

      - name: Upload client build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist-${{ github.sha }}
          path: client/dist/
          retention-days: 7
